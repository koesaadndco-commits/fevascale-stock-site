<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>準備中 ｜ Fevascale Stock －棚簡－</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg0:#040814;--bg1:#0a1530;--bg2:#0d2147;
  --gold0:#ffe7a8;--gold1:#f3c25a;--gold2:#c8902f;--gold3:#a6701c;
  --ink:#eaf4ff;--muted:#9fb6d4;--line:rgba(120,170,230,.22);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:var(--ink);
  min-height:100%;display:flex;align-items:center;justify-content:center;overflow-x:hidden;padding:32px 18px;
  background:radial-gradient(1200px 800px at 50% 18%,rgba(54,184,255,.16),transparent 60%),
    radial-gradient(1000px 700px at 80% 90%,rgba(150,90,255,.14),transparent 60%),
    linear-gradient(160deg,var(--bg0) 0%,var(--bg1) 45%,var(--bg2) 100%);}
#net{position:fixed;inset:0;z-index:-1;}
.wrap{position:relative;width:100%;max-width:560px;text-align:center;}
.company{font-size:15px;font-weight:700;letter-spacing:.05em;color:#cfe2fb;margin-bottom:8px;}
.product{font-family:'Anton','Noto Sans JP',sans-serif;font-weight:900;font-size:26px;letter-spacing:.04em;line-height:1.1;text-transform:uppercase;
  background:linear-gradient(92deg,var(--gold0) 0%,var(--gold1) 38%,var(--gold2) 72%,var(--gold3) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 22px rgba(243,194,90,.30);margin-bottom:26px;}
.product .jp{font-size:23px;}
.spinner{width:64px;height:64px;margin:0 auto 26px;border-radius:50%;
  border:3px solid rgba(243,194,90,.18);border-top-color:var(--gold1);
  box-shadow:0 0 22px rgba(243,194,90,.30);animation:spin 1.1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.headline{font-family:'Anton','Noto Sans JP',sans-serif;font-weight:900;
  font-size:clamp(44px,13vw,84px);line-height:1.05;letter-spacing:.06em;color:#fff;
  text-shadow:0 0 40px rgba(54,184,255,.45),0 0 14px rgba(243,194,90,.35);
  animation:glow 2.4s ease-in-out infinite;margin-bottom:18px;}
@keyframes glow{0%,100%{opacity:.92}50%{opacity:1;text-shadow:0 0 56px rgba(54,184,255,.6),0 0 18px rgba(243,194,90,.5)}}
.sub{font-size:14.5px;line-height:1.9;color:#cfe2fb;margin-bottom:30px;}
.dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--gold1);margin:0 4px;
  box-shadow:0 0 10px rgba(243,194,90,.8);animation:bounce 1.4s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}
.foot{margin-top:34px;font-size:10px;letter-spacing:.05em;color:#e0bd66;text-shadow:0 0 8px rgba(243,194,90,.4);}
</style>
</head>
<body>
<canvas id="net"></canvas>
<div class="wrap">
  <div class="product">Fevascale Stock <span class="jp">－棚簡－</span></div>

  <div class="spinner"></div>
  <div class="headline">ただいま準備中</div>
  <div class="sub">新しいページへ移行作業を行っています。<br>もうしばらくお待ちください。</div>
  <div class="dots"><span></span><span></span><span></span></div>

  <div class="foot">© 2026 Fevascale Stock</div>
</div>
<script>
const c=document.getElementById('net'),x=c.getContext('2d');let W,H,pts;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;
  const n=Math.min(70,Math.floor(W*H/22000));
  pts=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25}));}
resize();addEventListener('resize',resize);
function tick(){x.clearRect(0,0,W,H);
  for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
  for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){
    const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<140){x.strokeStyle='rgba(120,170,230,'+(0.16*(1-d/140))+')';x.lineWidth=1;
      x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();}}
    x.fillStyle='rgba(243,194,90,.55)';x.beginPath();x.arc(pts[i].x,pts[i].y,1.6,0,7);x.fill();}
  requestAnimationFrame(tick);}
tick();
</script>
</body>
</html>
